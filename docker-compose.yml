services:
  # PO-token provider — needed for YouTube on datacenter IPs (the chosen deploy target).
  # yt-dlp auto-discovers it via the extractor-arg base_url the server passes.
  bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    # Internal only; the server reaches it at http://bgutil:4416.
    expose:
      - "4416"

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      # Bound to localhost — the web tier (and Caddy in prod) front it; never exposed publicly.
      # Override the host port with HOST_PORT=... if 3000 is taken locally.
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      NODE_ENV: production
      TRACKS_DIR: /tmp/radio-tracks
      CORS_ORIGIN: "*"
      PO_TOKEN_BASE_URL: http://bgutil:4416
      # "default" exposes audio-only m4a (fast); web_safari,tv kept as a fallback chain.
      PLAYER_CLIENT: "${PLAYER_CLIENT:-default,web_safari,tv}"
      AUDIO_FORMAT: "${AUDIO_FORMAT:-m4a}"
      COOKIES_FILE: /run/secrets/cookies.txt
      MAX_DURATION_SEC: "${MAX_DURATION_SEC:-1200}"
      MAX_FILESIZE: 100M
      AUDIO_BITRATE: 192K
      DOWNLOAD_CONCURRENCY: "2"
      DOWNLOAD_TIMEOUT_MS: "${DOWNLOAD_TIMEOUT_MS:-120000}"
      # Nimiq payments (Phase 3): payments turn on only when RECIPIENT_ADDRESS is set.
      NIMIQ_NETWORK: "${NIMIQ_NETWORK:-mainnet}"
      RPC_URL: "${RPC_URL:-}"
      RECIPIENT_ADDRESS: "${RECIPIENT_ADDRESS:-}"
      MIN_CONFIRMATIONS: "${MIN_CONFIRMATIONS:-10}"
      PRICE_NIM: "${PRICE_NIM:-1}"
      # Persistence + cleanup (Phase 6). DB lives in the tracks volume so it survives restarts.
      FILE_TTL_MIN: "${FILE_TTL_MIN:-180}"
      DISK_CAP_MB: "${DISK_CAP_MB:-4096}"
      # Song metadata (AcoustID fingerprint) + content gate (Phase 7).
      ACOUSTID_API_KEY: "${ACOUSTID_API_KEY:-}"
      CONTENT_GATE_ENABLED: "${CONTENT_GATE_ENABLED:-true}"
      MIN_SONG_SEC: "${MIN_SONG_SEC:-45}"
      MAX_SONG_SEC: "${MAX_SONG_SEC:-1200}"
    volumes:
      # Empty file = no cookies (the downloader skips --cookies for an empty file).
      # Replace with a real Netscape cookies.txt from a throwaway account if YouTube
      # blocks the host's IP. See secrets/cookies.txt.example.
      - ./secrets/cookies.txt:/run/secrets/cookies.txt:ro
      - tracks:/tmp/radio-tracks
    depends_on:
      - bgutil

    # Resource caps (Phase 6). The download worker is bounded; these stop a runaway
    # yt-dlp/ffmpeg or a fork-bomb from taking down the host.
    mem_limit: 1g
    cpus: 1.5
    pids_limit: 256

    # ── SSRF egress hardening (plan: bring forward to Phase 1) ──────────────────
    # yt-dlp does its own DNS/redirect resolution, so the in-app host allowlist is
    # not enough on its own. On the real VM, block the container's egress to private
    # ranges and the cloud metadata endpoint. This needs host-level capability and
    # is environment-specific, so it's documented here rather than enabled by default:
    #
    #   cap_add: ["NET_ADMIN"]
    #   entrypoint: sh -c "iptables -A OUTPUT -d 169.254.169.254 -j DROP &&
    #                      iptables -A OUTPUT -d 10.0.0.0/8 -j DROP &&
    #                      iptables -A OUTPUT -d 172.16.0.0/12 -j DROP &&
    #                      iptables -A OUTPUT -d 192.168.0.0/16 -j DROP &&
    #                      exec pnpm --filter @radio/server start"
    # (Requires iptables in the image. Alternatively enforce egress rules at the
    #  cloud firewall / security-group level, which is cleaner in production.)

  # Production web tier: builds the SPA and serves it with nginx, proxying /api, /static and
  # /ws to `server` over the compose network. Enabled only with `--profile prod` (local dev
  # uses the Vite dev server instead). Front it with your reverse proxy (e.g. Caddy):
  #   radio.example.com { reverse_proxy 127.0.0.1:8780 }
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "127.0.0.1:${WEB_PORT:-8780}:80"
    depends_on:
      - server
    mem_limit: 128m

volumes:
  tracks:
