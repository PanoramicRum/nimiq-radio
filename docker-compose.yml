services:
  # PO-token provider — needed for YouTube on datacenter IPs (the chosen deploy target).
  # yt-dlp auto-discovers it via the extractor-arg base_url the server passes.
  bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    # Internal only; the server reaches it at http://bgutil:4416.
    expose:
      - "4416"
    networks:
      - radionet

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      # Bound to localhost — the web tier (and Caddy in prod) front it; never exposed publicly.
      # Override the host port with HOST_PORT=... if 3000 is taken locally.
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      NODE_ENV: production
      TRACKS_DIR: /tmp/radio-tracks
      # Same-origin through the web tier, so "*" is fine for the prototype. Lock to your
      # domain in prod by setting CORS_ORIGIN in .env (comma-separated origins allowed).
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      PO_TOKEN_BASE_URL: http://bgutil:4416
      # "default" exposes audio-only m4a (fast); web_safari,tv kept as a fallback chain.
      PLAYER_CLIENT: "${PLAYER_CLIENT:-default,web_safari,tv}"
      AUDIO_FORMAT: "${AUDIO_FORMAT:-m4a}"
      COOKIES_FILE: /run/secrets/cookies.txt
      MAX_DURATION_SEC: "${MAX_DURATION_SEC:-1500}"
      MAX_FILESIZE: 100M
      AUDIO_BITRATE: 192K
      DOWNLOAD_CONCURRENCY: "2"
      DOWNLOAD_TIMEOUT_MS: "${DOWNLOAD_TIMEOUT_MS:-120000}"
      # Nimiq payments (Phase 3): payments turn on only when RECIPIENT_ADDRESS is set.
      NIMIQ_NETWORK: "${NIMIQ_NETWORK:-mainnet}"
      RPC_URL: "${RPC_URL:-}"
      RECIPIENT_ADDRESS: "${RECIPIENT_ADDRESS:-}"
      MIN_CONFIRMATIONS: "${MIN_CONFIRMATIONS:-10}"
      PRICE_NIM: "${PRICE_NIM:-1}"
      # Persistence + cleanup (Phase 6). DB lives in the tracks volume so it survives restarts.
      FILE_TTL_MIN: "${FILE_TTL_MIN:-180}"
      DISK_CAP_MB: "${DISK_CAP_MB:-4096}"
      # Song metadata (AcoustID fingerprint) + content gate (Phase 7).
      ACOUSTID_API_KEY: "${ACOUSTID_API_KEY:-}"
      CONTENT_GATE_ENABLED: "${CONTENT_GATE_ENABLED:-true}"
      MIN_SONG_SEC: "${MIN_SONG_SEC:-45}"
      MAX_SONG_SEC: "${MAX_SONG_SEC:-1500}"
    volumes:
      # Empty file = no cookies (the downloader skips --cookies for an empty file).
      # Replace with a real Netscape cookies.txt from a throwaway account if YouTube
      # blocks the host's IP. See secrets/cookies.txt.example.
      - ./secrets/cookies.txt:/run/secrets/cookies.txt:ro
      - tracks:/tmp/radio-tracks
    depends_on:
      - bgutil
    networks:
      - radionet

    # Resource caps (Phase 6). The download worker is bounded; these stop a runaway
    # yt-dlp/ffmpeg or a fork-bomb from taking down the host.
    mem_limit: 1g
    cpus: 1.5
    pids_limit: 256

    # ── SSRF egress hardening ───────────────────────────────────────────────────
    # yt-dlp does its own DNS/redirect resolution, so the in-app host allowlist is
    # not enough on its own: a malicious URL could steer egress at the cloud metadata
    # endpoint (169.254.169.254 -> credential theft) or your private network.
    # We enforce this at the HOST level, scoped to the `radionet` subnet below, via
    # Docker's DOCKER-USER chain — NOT with in-container iptables + NET_ADMIN, which
    # a compromised container could flush and which would risk neighbours on a shared
    # host. See deploy/radio-egress.sh + deploy/radio-egress.service and DEPLOY.md.

  # Production web tier: builds the SPA and serves it with nginx, proxying /api, /static and
  # /ws to `server` over the compose network. Enabled only with `--profile prod` (local dev
  # uses the Vite dev server instead). Front it with your reverse proxy (e.g. Caddy):
  #   radio.example.com { reverse_proxy 127.0.0.1:8780 }
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "127.0.0.1:${WEB_PORT:-8780}:80"
    depends_on:
      - server
    networks:
      - radionet
    mem_limit: 256m

  # One-shot: download the public-domain (CC0) filler library into the tracks volume so the radio
  # always has something to play. Reuses the server image (it already has node + ffmpeg + curl).
  # Run once after `up` (and again whenever you edit apps/server/filler/manifest.json):
  #   docker compose --profile init run --rm filler-fetch
  filler-fetch:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    profiles: ["init"]
    restart: "no"
    environment:
      FILLER_DIR: /tmp/radio-tracks/library
      FILLER_MANIFEST: /app/apps/server/filler/manifest.json
    entrypoint: ["node"]
    command: ["/deploy/fetch-filler.mjs"]
    volumes:
      - ./deploy:/deploy:ro
      - tracks:/tmp/radio-tracks
    networks:
      - radionet

volumes:
  tracks:

networks:
  # Dedicated bridge with a PINNED subnet so the host egress rules in
  # deploy/radio-egress.sh can target exactly this stack (and nothing else).
  # Intentionally IPv4-only: the radio containers never originate IPv6, so there
  # is no IPv6 egress surface to filter (public IPv6 reachability is handled by
  # your host reverse proxy, not the containers). If `docker compose up` reports a
  # subnet overlap with another project, pick a free /24 and update SUBNET in
  # deploy/radio-egress.sh to match.
  radionet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
