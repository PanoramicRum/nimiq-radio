<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Match the browser/Nimiq Pay chrome to the page background per color scheme. -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#232b44" media="(prefers-color-scheme: dark)" />
    <title>Nimiq Radio</title>
    <!-- Apply a saved light/dark choice before paint to avoid a flash (see ThemeToggle). -->
    <script>
      try {
        var t = localStorage.getItem("nimiq-radio-theme");
        if (t === "light" || t === "dark") document.documentElement.style.colorScheme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
